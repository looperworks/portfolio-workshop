<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 380" font-family="Inter, system-ui, sans-serif">
  <rect width="820" height="380" fill="#f8f8f8" rx="2"/>

  <!-- Title -->
  <text x="410" y="28" text-anchor="middle" font-size="9" font-weight="500" fill="#1a1a1a" letter-spacing="1.2">TYPEFACE SELECTION DECISION FLOW</text>
  <line x1="310" y1="38" x2="510" y2="38" stroke="#E85D3A" stroke-width="1.2"/>

  <!-- Start node -->
  <rect x="330" y="52" width="160" height="30" rx="2" fill="#1a1a1a"/>
  <text x="410" y="71" text-anchor="middle" font-size="7.5" font-weight="500" fill="white">What is your project tone?</text>

  <!-- Arrow down -->
  <line x1="410" y1="82" x2="410" y2="100" stroke="#ccc" stroke-width="1"/>

  <!-- Branch labels -->
  <line x1="410" y1="100" x2="120" y2="100" stroke="#ccc" stroke-width="1"/>
  <line x1="410" y1="100" x2="310" y2="100" stroke="#ccc" stroke-width="1"/>
  <line x1="410" y1="100" x2="510" y2="100" stroke="#ccc" stroke-width="1"/>
  <line x1="410" y1="100" x2="700" y2="100" stroke="#ccc" stroke-width="1"/>

  <line x1="120" y1="100" x2="120" y2="115" stroke="#ccc" stroke-width="1"/>
  <line x1="310" y1="100" x2="310" y2="115" stroke="#ccc" stroke-width="1"/>
  <line x1="510" y1="100" x2="510" y2="115" stroke="#ccc" stroke-width="1"/>
  <line x1="700" y1="100" x2="700" y2="115" stroke="#ccc" stroke-width="1"/>

  <!-- Branch 1: Technical / Neutral -->
  <rect x="30" y="115" width="180" height="24" rx="2" fill="#E85D3A"/>
  <text x="120" y="131" text-anchor="middle" font-size="7" font-weight="500" fill="white">Technical / Neutral</text>

  <rect x="30" y="148" width="180" height="115" rx="2" fill="white" stroke="#e0e0e0" stroke-width="1"/>
  <text x="120" y="167" text-anchor="middle" font-size="7" font-weight="500" fill="#1a1a1a">→ Modernist Workhorses</text>
  <line x1="50" y1="176" x2="190" y2="176" stroke="#f0f0f0" stroke-width="0.8"/>
  <text x="50" y="192" font-size="6.5" fill="#666">Helvetica — universal standard</text>
  <text x="50" y="206" font-size="6.5" fill="#666">DIN — diagram annotations</text>
  <text x="50" y="220" font-size="6.5" fill="#666">Univers — complex layouts</text>
  <text x="50" y="234" font-size="6.5" fill="#666">Futura — bold headers</text>
  <text x="50" y="252" font-size="6" fill="#999">Let the drawings speak.</text>

  <!-- Branch 2: Personal / Warm -->
  <rect x="220" y="115" width="180" height="24" rx="2" fill="#E85D3A"/>
  <text x="310" y="131" text-anchor="middle" font-size="7" font-weight="500" fill="white">Personal / Warm</text>

  <rect x="220" y="148" width="180" height="115" rx="2" fill="white" stroke="#e0e0e0" stroke-width="1"/>
  <text x="310" y="167" text-anchor="middle" font-size="7" font-weight="500" fill="#1a1a1a">→ Humanist &amp; Contemporary</text>
  <line x1="240" y1="176" x2="380" y2="176" stroke="#f0f0f0" stroke-width="0.8"/>
  <text x="240" y="192" font-size="6.5" fill="#666">Avenir — personal statements</text>
  <text x="240" y="206" font-size="6.5" fill="#666">Söhne — modern branding</text>
  <text x="240" y="220" font-size="6.5" fill="#666">Gill Sans — storytelling</text>
  <text x="240" y="234" font-size="6.5" fill="#666">Circular — studio branding</text>
  <text x="240" y="252" font-size="6" fill="#999">Warmth without losing rigor.</text>

  <!-- Branch 3: Expressive / Stylistic -->
  <rect x="420" y="115" width="180" height="24" rx="2" fill="#E85D3A"/>
  <text x="510" y="131" text-anchor="middle" font-size="7" font-weight="500" fill="white">Expressive / Stylistic</text>

  <rect x="420" y="148" width="180" height="115" rx="2" fill="white" stroke="#e0e0e0" stroke-width="1"/>
  <text x="510" y="167" text-anchor="middle" font-size="7" font-weight="500" fill="#1a1a1a">→ Editorial &amp; Stylistic</text>
  <line x1="440" y1="176" x2="580" y2="176" stroke="#f0f0f0" stroke-width="0.8"/>
  <text x="440" y="192" font-size="6.5" fill="#666">Neue Montreal — luxury branding</text>
  <text x="440" y="206" font-size="6.5" fill="#666">GT Alpina — academic work</text>
  <text x="440" y="220" font-size="6.5" fill="#666">Monolisk — Brutalist projects</text>
  <text x="440" y="234" font-size="6.5" fill="#666">Didot — classical architecture</text>
  <text x="440" y="252" font-size="6" fill="#999">Type as design thesis.</text>

  <!-- Branch 4: Production / Digital -->
  <rect x="610" y="115" width="180" height="24" rx="2" fill="#E85D3A"/>
  <text x="700" y="131" text-anchor="middle" font-size="7" font-weight="500" fill="white">Production / Digital</text>

  <rect x="610" y="148" width="180" height="115" rx="2" fill="white" stroke="#e0e0e0" stroke-width="1"/>
  <text x="700" y="167" text-anchor="middle" font-size="7" font-weight="500" fill="#1a1a1a">→ Functional &amp; Display</text>
  <line x1="630" y1="176" x2="770" y2="176" stroke="#f0f0f0" stroke-width="0.8"/>
  <text x="630" y="192" font-size="6.5" fill="#666">Century Gothic — CAD/BIM</text>
  <text x="630" y="206" font-size="6.5" fill="#666">Tungsten — competition boards</text>
  <text x="630" y="220" font-size="6.5" fill="#666">Roboto — digital portfolios</text>
  <text x="630" y="234" font-size="6.5" fill="#666">Montserrat — web presentations</text>
  <text x="630" y="252" font-size="6" fill="#999">Legibility at every scale.</text>

  <!-- Selection Principles box -->
  <rect x="30" y="280" width="760" height="70" rx="2" fill="white" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="30" y="280" width="760" height="22" rx="2" fill="#f0f0f0"/>
  <text x="410" y="295" text-anchor="middle" font-size="7" font-weight="500" fill="#1a1a1a" letter-spacing="0.8">SELECTION PRINCIPLES</text>

  <text x="60" y="318" font-size="7" fill="#1a1a1a"><tspan font-weight="500">Limit your palette</tspan> — 2–3 typefaces maximum</text>
  <text x="60" y="334" font-size="7" fill="#1a1a1a"><tspan font-weight="500">Establish hierarchy</tspan> — display weight for headings, lighter weight for body</text>

  <text x="440" y="318" font-size="7" fill="#1a1a1a"><tspan font-weight="500">Align with intent</tspan> — type should reinforce your architectural thesis</text>
  <text x="440" y="334" font-size="7" fill="#1a1a1a"><tspan font-weight="500">Test at production scale</tspan> — proof at final output size (screen, print, exhibition)</text>

  <!-- Bottom label -->
  <rect x="30" y="360" width="760" height="1" fill="#E85D3A" opacity="0.3"/>
  <text x="410" y="374" text-anchor="middle" font-size="6.5" fill="#888">Fig 7b — Typeface selection decision flow · Match your project tone to the right category</text>
</svg>