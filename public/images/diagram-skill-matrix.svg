<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      text { font-family: Inter, -apple-system, system-ui, sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" fill="#f8f8f8"/>

  <!-- Title -->
  <text x="400" y="30" font-size="9" font-weight="400" letter-spacing="1.6" fill="#999" text-anchor="middle" text-transform="uppercase">
    PROJECT–SKILL COVERAGE MATRIX
  </text>

  <!-- Header Row: Skills -->
  <text x="140" y="85" font-size="7" fill="#999" text-anchor="middle">Sustainability</text>
