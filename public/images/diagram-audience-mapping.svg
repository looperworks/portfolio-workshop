<svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      text { font-family: Inter, -apple-system, system-ui, sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="380" fill="#f8f8f8"/>

  <!-- Title -->
  <text x="400" y="30" font-size="9" font-weight="400" letter-spacing="1.6" fill="#999" text-anchor="middle" text-transform="uppercase">
    AUDIENCE EVALUATION PRIORITIES
  </text>

  <!-- Column 1: Undergrad Admissions -->
  <rect x="40" y="70" width="150" height="180" fill="none" stroke="#1a1a1a" stroke-width="1.2" rx="2"/>
  <text x="115" y="95" font-size="8" font-weight="500" fill="#1a1a1a" text-anchor="middle">Undergrad Admissions</text>
  <text x="55" y="120" font-size="7" fill="#999">• Design thinking</text>
  <text x="55" y="135" font-size="8" fill="#999">• Creativity</text>
  <text x="55" y="150" font-size="8" fill="#999">• Communication</text>
  <text x="55" y="165" font-size="8" fill="#999">• Curiosity</text>
  <text x="55" y="180" font-size="8" fill="#999">• Growth potential</text>

  <!-- Column 2: Grad School (filled) -->
  <rect x="220" y="70" width="150" height="180" fill="#1a1a1a" stroke="#1a1a1a" stroke-width="1.2" rx="2"/>
  <text x="295" y="95" font-size="8" font-weight="500" fill="#ffffff" text-anchor="middle">Grad School</text>
  <text x="235" y="120" font-size="7" fill="#ffffff">• Research skills</text>
  <text x="235" y="135" font-size="8" fill="#ffffff">• Technical depth</text>
  <text x="235" y="150" font-size="8" fill="#ffffff">• Problem framing</text>
  <text x="235" y="165" font-size="8" fill="#ffffff">• Intellectual rigor</text>
  <text x="235" y="180" font-size="8" fill="#ffffff">• Thesis potential</text>

  <!-- Column 3: Boutique Firms (filled orange) -->
  <rect x="400" y="70" width="150" height="180" fill="#E85D3A" stroke="#E85D3A" stroke-width="1.2" rx="2"/>
  <text x="475" y="95" font-size="8" font-weight="500" fill="#ffffff" text-anchor="middle">Boutique Firms</text>
  <text x="415" y="120" font-size="7" fill="#ffffff">• Unique voice</text>
  <text x="415" y="135" font-size="8" fill="#ffffff">• Craft excellence</text>
  <text x="415" y="150" font-size="8" fill="#ffffff">• Design narrative</text>
  <text x="415" y="165" font-size="8" fill="#ffffff">• Conceptual depth</text>
  <text x="415" y="180" font-size="8" fill="#ffffff">• Cultural fit</text>

  <!-- Column 4: Large Firms -->
  <rect x="580" y="70" width="150" height="180" fill="none" stroke="#1a1a1a" stroke-width="1.2" rx="2"/>
  <text x="655" y="95" font-size="8" font-weight="500" fill="#1a1a1a" text-anchor="middle">Large Firms</text>
  <text x="595" y="120" font-size="7" fill="#999">• Process clarity</text>
  <text x="595" y="135" font-size="8" fill="#999">• Team collaboration</text>
  <text x="595" y="150" font-size="8" fill="#999">• Deliverables</text>
  <text x="595" y="165" font-size="8" fill="#999">• Technical skills</text>
  <text x="595" y="180" font-size="8" fill="#999">• Scalability</text>

  <!-- Figure label -->
  <line x1="400" y1="330" x2="400" y2="332" stroke="#ccc" stroke-width="1"/>
  <text x="400" y="345" font-size="7" fill="#ccc" text-anchor="middle">FIG. 11</text>
</svg>