<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 320" font-family="Inter, system-ui, sans-serif">
  <rect width="820" height="320" fill="#f8f8f8" rx="2"/>

  <!-- Title -->
  <text x="410" y="28" text-anchor="middle" font-size="9" font-weight="500" fill="#1a1a1a" letter-spacing="1.2">RECOMMENDED PAIRINGS &amp; SIZE GUIDELINES</text>
  <line x1="290" y1="38" x2="530" y2="38" stroke="#E85D3A" stroke-width="1.2"/>

  <!-- Pairings section -->
  <rect x="30" y="55" width="380" height="230" rx="2" fill="white" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="30" y="55" width="380" height="22" rx="2" fill="#1a1a1a"/>
  <text x="220" y="70" text-anchor="middle" font-size="7" font-weight="500" fill="white" letter-spacing="0.8">TYPEFACE PAIRINGS</text>

  <!-- Pairing 1 -->
  <rect x="48" y="90" width="344" height="40" rx="2" fill="#fafafa" stroke="#f0f0f0" stroke-width="0.8"/>
  <text x="60" y="106" font-size="8" font-weight="500" fill="#1a1a1a">Futura + Minion Pro</text>
  <text x="60" y="122" font-size="6.5" fill="#666">Geometric headings with humanist serif body — bold contrast, high readability</text>
  <circle cx="370" cy="110" r="8" fill="#E85D3A" opacity="0.15"/>
  <text x="370" y="113" text-anchor="middle" font-size="6" font-weight="500" fill="#E85D3A">1</text>

  <!-- Pairing 2 -->
  <rect x="48" y="140" width="344" height="40" rx="2" fill="#fafafa" stroke="#f0f0f0" stroke-width="0.8"/>
  <text x="60" y="156" font-size="8" font-weight="500" fill="#1a1a1a">Helvetica + GT Alpina</text>
  <text x="60" y="172" font-size="6.5" fill="#666">Neutral system font with editorial warmth — academic without being cold</text>
  <circle cx="370" cy="160" r="8" fill="#E85D3A" opacity="0.15"/>
  <text x="370" y="163" text-anchor="middle" font-size="6" font-weight="500" fill="#E85D3A">2</text>

  <!-- Pairing 3 -->
  <rect x="48" y="190" width="344" height="40" rx="2" fill="#fafafa" stroke="#f0f0f0" stroke-width="0.8"/>
  <text x="60" y="206" font-size="8" font-weight="500" fill="#1a1a1a">DIN + Source Serif 4</text>
  <text x="60" y="222" font-size="6.5" fill="#666">Industrial precision with readable body text — clean technical documentation</text>
  <circle cx="370" cy="210" r="8" fill="#E85D3A" opacity="0.15"/>
  <text x="370" y="213" text-anchor="middle" font-size="6" font-weight="500" fill="#E85D3A">3</text>

  <!-- Pairing 4 -->
  <rect x="48" y="240" width="344" height="40" rx="2" fill="#fafafa" stroke="#f0f0f0" stroke-width="0.8"/>
  <text x="60" y="256" font-size="8" font-weight="500" fill="#1a1a1a">Söhne + Crimson Pro</text>
  <text x="60" y="272" font-size="6.5" fill="#666">Contemporary headings with classic body — modern portfolio with depth</text>
  <circle cx="370" cy="260" r="8" fill="#E85D3A" opacity="0.15"/>
  <text x="370" y="263" text-anchor="middle" font-size="6" font-weight="500" fill="#E85D3A">4</text>

  <!-- Size Guidelines section -->
  <rect x="430" y="55" width="360" height="230" rx="2" fill="white" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="430" y="55" width="360" height="22" rx="2" fill="#1a1a1a"/>
  <text x="610" y="70" text-anchor="middle" font-size="7" font-weight="500" fill="white" letter-spacing="0.8">SIZE GUIDELINES</text>

  <!-- Size bars -->
  <text x="450" y="100" font-size="7" font-weight="500" fill="#1a1a1a">Display titles</text>
  <rect x="560" y="90" width="200" height="14" rx="1" fill="#E85D3A" opacity="0.2"/>
  <rect x="560" y="90" width="200" height="14" rx="1" fill="none" stroke="#E85D3A" stroke-width="0.8" opacity="0.5"/>
  <text x="660" y="100" text-anchor="middle" font-size="6.5" font-weight="500" fill="#E85D3A">24–48 pt</text>

  <text x="450" y="128" font-size="7" font-weight="500" fill="#1a1a1a">Section headers</text>
  <rect x="560" y="118" width="140" height="14" rx="1" fill="#E85D3A" opacity="0.15"/>
  <rect x="560" y="118" width="140" height="14" rx="1" fill="none" stroke="#E85D3A" stroke-width="0.8" opacity="0.4"/>
  <text x="630" y="128" text-anchor="middle" font-size="6.5" font-weight="500" fill="#c44a2d">14–20 pt</text>

  <text x="450" y="156" font-size="7" font-weight="500" fill="#1a1a1a">Body text</text>
  <rect x="560" y="146" width="90" height="14" rx="1" fill="#1a1a1a" opacity="0.1"/>
  <rect x="560" y="146" width="90" height="14" rx="1" fill="none" stroke="#1a1a1a" stroke-width="0.8" opacity="0.3"/>
  <text x="605" y="156" text-anchor="middle" font-size="6.5" font-weight="500" fill="#555">9–11 pt</text>

  <text x="450" y="184" font-size="7" font-weight="500" fill="#1a1a1a">Captions</text>
  <rect x="560" y="174" width="60" height="14" rx="1" fill="#1a1a1a" opacity="0.07"/>
  <rect x="560" y="174" width="60" height="14" rx="1" fill="none" stroke="#1a1a1a" stroke-width="0.8" opacity="0.2"/>
  <text x="590" y="184" text-anchor="middle" font-size="6.5" font-weight="500" fill="#777">7–8 pt</text>

  <line x1="450" y1="204" x2="770" y2="204" stroke="#f0f0f0" stroke-width="0.8"/>

  <!-- Key rule -->
  <rect x="448" y="214" width="324" height="58" rx="2" fill="#fafafa" stroke="#E85D3A" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="610" y="232" text-anchor="middle" font-size="7.5" font-weight="500" fill="#1a1a1a">Maximum: 2–3 typefaces per portfolio</text>
  <text x="610" y="248" text-anchor="middle" font-size="6.5" fill="#666">One for headings · One for body · One optional accent</text>
  <text x="610" y="262" text-anchor="middle" font-size="6.5" fill="#888">Typographic restraint signals design maturity.</text>

  <!-- Bottom label -->
  <rect x="30" y="296" width="760" height="1" fill="#E85D3A" opacity="0.3"/>
  <text x="410" y="312" text-anchor="middle" font-size="6.5" fill="#888">Fig 7c — Recommended typeface pairings and size standards for architecture portfolios</text>
</svg>