<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32"><style>.frame{fill:none;stroke:#2b2b2b;stroke-width:2.2;stroke-linejoin:miter;opacity:0;animation:appear 0.4s 0.1s ease forwards}.step{fill:#2b2b2b;opacity:0}.s1{animation:rise 0.25s 0.5s cubic-bezier(0.16,1,0.3,1) forwards}.s2{animation:rise 0.25s 0.72s cubic-bezier(0.16,1,0.3,1) forwards}.s3{animation:rise 0.25s 0.94s cubic-bezier(0.16,1,0.3,1) forwards}.s4{animation:rise 0.25s 1.16s cubic-bezier(0.16,1,0.3,1) forwards}@keyframes appear{to{opacity:1}}@keyframes rise{from{opacity:0;transform:translateY(1.5px)}to{opacity:1;transform:translateY(0)}}</style><defs><clipPath id="inner"><rect x="8.1" y="4.1" width="15.8" height="23.8"/></clipPath></defs><rect class="frame" x="7" y="3" width="18" height="26"/><g clip-path="url(#inner)"><rect class="step s1" x="7" y="22" width="18" height="8"/><rect class="step s2" x="7" y="17.5" width="13" height="4.5"/><rect class="step s3" x="7" y="13" width="9" height="4.5"/><rect class="step s4" x="7" y="9" width="5.5" height="4"/></g></svg>
